# PostgreSQL Performance Tuning - NestCart
# 针对时序数据(传感器/告警场景优化

# Memory Configuration (假设容器环境 2C4G 场景
shared_buffers = 1GB
effective_cache_size = 3GB
maintenance_work_mem = 256MB
work_mem = 16MB

# Checkpoint & WAL
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# Query Planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Connections &nbsp;
max_connections = 200

# Logging
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on

# BRIN index optimization (for time-series
vacuum_cost_delay = 2ms
vacuum_cost_limit = 2000

# Autovacuum for high-write tables
autovacuum_max_workers = 4
autovacuum_vacuum_cost_delay = 10ms

# Timezone
timezone = 'Asia/Shanghai'

# JSONB support for vision analysis
jit = off
